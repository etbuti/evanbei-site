<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance Heatmap</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafafa;color:#111;}
header{padding:14px 18px;border-bottom:1px solid #eee;background:#fff;}
main{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 52px);}
#canvas{position:relative;background:#fafafa;overflow:hidden;}
#sidebar{border-left:1px solid #eee;background:#fff;padding:16px;overflow:auto;}
.node{
  position:absolute;
  border-radius:999px;
  border:2px solid #dc2626;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:12px;
  color:#111;
}
.item{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
</style>
</head>
<body>
<header><strong>Governance Heatmap</strong></header>
<main>
  <section id="canvas"></section>
  <aside id="sidebar">
    <h3>Top Governance Pressure</h3>
    <div id="topNodes">Loading…</div>
    <h3 style="margin-top:18px;">Level Changes</h3>
    <div id="levels">Loading…</div>
  </aside>
</main>

<script>
let heat = null;
let positions = {};

async function loadData(){
  heat = await fetch("/explorer/governance-heatmap.json").then(r => r.json());
  render();
}

function render(){
  const canvas = document.getElementById("canvas");
  canvas.querySelectorAll(".node").forEach(n => n.remove());

  const nodes = heat.nodes || [];
  const cx = canvas.clientWidth / 2;
  const cy = canvas.clientHeight / 2;
  const r = Math.min(canvas.clientWidth, canvas.clientHeight) / 3;

  nodes.forEach((n, i) => {
    const a = (2 * Math.PI * i) / Math.max(nodes.length, 1);
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;

    const size = 34 + n.heat * 8;
    const alpha = Math.min(0.15 + n.heat * 0.12, 0.9);

    const div = document.createElement("div");
    div.className = "node";
    div.style.width = `${size}px`;
    div.style.height = `${size}px`;
    div.style.left = `${x}px`;
    div.style.top = `${y}px`;
    div.style.background = `rgba(220,38,38,${alpha})`;
    div.textContent = n.node_id;
    canvas.appendChild(div);
  });

  document.getElementById("topNodes").innerHTML =
    nodes.slice(0, 10).map(n => `<div class="item">${n.node_id} — governance heat ${n.heat}</div>`).join("");

  document.getElementById("levels").innerHTML =
    (heat.levels || []).map(l => `<div class="item">${l.level} — ${l.count}</div>`).join("");
}

window.addEventListener("resize", () => location.reload());

loadData();
</script>
</body>
</html>
