<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Origins Evidence Explorer</title>

<style>
body{margin:0;font-family:-apple-system,Segoe UI,sans-serif;background:#fafafa;}
header{padding:14px 18px;border-bottom:1px solid #eee;background:#fff;}

main{
  display:grid;
  grid-template-columns:240px 1fr 320px;
  height:calc(100vh - 52px);
}

#timeline{
  border-right:1px solid #eee;
  background:#fff;
  overflow:auto;
}

.item{
  padding:12px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
}

.item.active{background:#eef6ff;}

#graph{
  position:relative;
}

.node{
  position:absolute;
  padding:8px 10px;
  border-radius:12px;
  border:2px solid #999;
  background:#fff;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  opacity:0.4;
}

.node.active{opacity:1;}

.node.anchor{border-color:#111;}
.node.certificate{border-color:#2563eb;background:#eef6ff;}
.node.node{border-color:#16a34a;background:#edfdf3;}

svg{
  position:absolute;
  width:100%;
  height:100%;
}

.line{stroke:#bbb;}
.line.active{stroke:#000;stroke-width:2;}

#detail{
  border-left:1px solid #eee;
  background:#fff;
  padding:16px;
}

.hash{
  font-family:monospace;
  font-size:12px;
  word-break:break-all;
}
</style>
</head>

<body>

<header><strong>AI Origins Evidence Explorer</strong></header>

<main>
  <div id="timeline"></div>
  <div id="graph"><svg id="lines"></svg></div>
  <div id="detail">Select an anchor</div>
</main>

<script>

let graphData, anchorMap={}, nodeMap={}, edgeEls=[];

async function init(){
  const idx = await fetch("/anchors/index.json").then(r=>r.json());

  // Timeline
  const tl = document.getElementById("timeline");

  for(const f of idx.anchors.reverse()){
    const a = await fetch("/anchors/"+f).then(r=>r.json());
    anchorMap["anchor:"+a.certificate_id] = a;

    const d=document.createElement("div");
    d.className="item";
    d.innerText=a.certificate_id;

    d.onclick=()=>selectAnchor("anchor:"+a.certificate_id,d);

    tl.appendChild(d);
  }

  graphData = await fetch("/anchors/graph.json").then(r=>r.json());
  renderGraph();
}

function layout(nodes,w,h){
  let out=[];
  const anchors = nodes.filter(n=>n.type==="anchor");
  const certs = nodes.filter(n=>n.type==="certificate");
  const signers = nodes.filter(n=>n.type==="node");

  anchors.forEach((n,i)=>out.push({...n,x:80,y:80+i*100}));
  certs.forEach((n,i)=>out.push({...n,x:w/2-60,y:80+i*100}));
  signers.forEach((n,i)=>out.push({...n,x:w-200,y:80+i*80}));

  return out;
}

function renderGraph(){
  const canvas=document.getElementById("graph");
  const svg=document.getElementById("lines");

  svg.innerHTML="";
  canvas.querySelectorAll(".node").forEach(n=>n.remove());

  const placed=layout(graphData.nodes,canvas.clientWidth,canvas.clientHeight);
  nodeMap = Object.fromEntries(placed.map(n=>[n.id,n]));

  // edges
  graphData.edges.forEach(e=>{
    const s=nodeMap[e.source];
    const t=nodeMap[e.target];
    if(!s||!t)return;

    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",s.x+40);
    l.setAttribute("y1",s.y+20);
    l.setAttribute("x2",t.x+40);
    l.setAttribute("y2",t.y+20);
    l.setAttribute("class","line");
    l.dataset.k=`${e.source}->${e.target}`;
    svg.appendChild(l);
    edgeEls.push(l);
  });

  // nodes
  placed.forEach(n=>{
    const d=document.createElement("div");
    d.className=`node ${n.type}`;
    d.style.left=n.x+"px";
    d.style.top=n.y+"px";
    d.dataset.id=n.id;
    d.innerText=n.label;

    canvas.appendChild(d);
  });
}

function clearAll(){
  document.querySelectorAll(".node").forEach(n=>{
    n.classList.remove("active");
  });
  edgeEls.forEach(e=>e.classList.remove("active"));
}

function activateNode(id){
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el) el.classList.add("active");
}

function activateEdge(a,b){
  const e=edgeEls.find(x=>x.dataset.k===`${a}->${b}`);
  if(e) e.classList.add("active");
}

function selectAnchor(anchorId,dom){
  document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
  dom.classList.add("active");

  clearAll();

  let cur = anchorId;

  while(cur){
    activateNode(cur);

    const a = anchorMap[cur];
    if(!a) break;

    const cert="cert:"+a.certificate_id;
    activateNode(cert);
    activateEdge(cur,cert);

    (a.signatures||[]).forEach(s=>{
      const nid="node:"+s.node_id;
      activateNode(nid);
      activateEdge(cert,nid);
    });

    if(!a.previous_anchor) break;

    const prev="anchor:"+a.previous_anchor.file.replace(".json","");
    activateEdge(cur,prev);
    cur=prev;
  }

  renderDetail(anchorMap[anchorId]);
}

function renderDetail(a){
  document.getElementById("detail").innerHTML=`
    <h3>${a.certificate_id}</h3>
    <div>Time: ${a.created_at}</div>
    <div style="margin-top:10px;">
      <div class="hash">${a.hash_sha256}</div>
    </div>
    <div style="margin-top:10px;">
      Previous: ${a.previous_anchor ? a.previous_anchor.file : "GENESIS"}
    </div>
    <div style="margin-top:10px;">
      Signatures:<br>
      ${(a.signatures||[]).map(s=>s.node_id).join("<br>")}
    </div>
  `;
}

init();

</script>

</body>
</html>
