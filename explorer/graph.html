<script>

let graphData = null;
let placed = [];
let nodeMap = {};
let edgeEls = [];
let anchorMap = {}; // anchor_id -> 原始 anchor 数据

async function loadGraph(){
  const res = await fetch("/anchors/graph.json");
  return await res.json();
}

async function loadAnchorData(){
  const res = await fetch("/anchors/index.json");
  const idx = await res.json();

  for (const f of idx.anchors){
    const a = await fetch("/anchors/"+f).then(r=>r.json());
    anchorMap["anchor:"+a.certificate_id] = a;
  }
}

function layout(nodes,w,h){
  const anchors = nodes.filter(n=>n.type==="anchor");
  const certs = nodes.filter(n=>n.type==="certificate");
  const signers = nodes.filter(n=>n.type==="node");

  let out=[];

  anchors.forEach((n,i)=>{
    out.push({...n,x:120,y:80+i*120});
  });

  certs.forEach((n,i)=>{
    out.push({...n,x:w/2-80,y:80+i*120});
  });

  signers.forEach((n,i)=>{
    out.push({...n,x:w-260,y:80+i*100});
  });

  return out;
}

function clearHighlight(){
  edgeEls.forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".node").forEach(n=>{
    n.style.opacity=0.3;
  });
}

function highlightNode(id){
  const n = document.querySelector(`[data-id="${id}"]`);
  if(n){
    n.style.opacity=1;
  }
}

function highlightEdge(src,dst){
  const e = edgeEls.find(x=>x.dataset.k===`${src}->${dst}`);
  if(e){
    e.classList.add("active");
  }
}

function traceChain(anchorId){
  clearHighlight();

  let cur = anchorId;

  while(cur){
    highlightNode(cur);

    const a = anchorMap[cur];
    if(!a) break;

    const certId = "cert:"+a.certificate_id;
    highlightNode(certId);
    highlightEdge(cur,certId);

    const sigs = a.signatures || [];
    sigs.forEach(s=>{
      const nid = "node:"+s.node_id;
      highlightNode(nid);
      highlightEdge(certId,nid);
    });

    if(!a.previous_anchor) break;

    const prev = "anchor:"+a.previous_anchor.file.replace(".json","");
    highlightEdge(cur,prev);
    cur = prev;
  }
}

function renderDetail(anchorId){
  const a = anchorMap[anchorId];
  const el = document.getElementById("detail");

  if(!a){
    el.innerHTML="No data";
    return;
  }

  el.innerHTML = `
    <h3>${a.certificate_id}</h3>

    <div><strong>Time:</strong> ${a.created_at}</div>

    <div style="margin-top:10px;">
      <strong>Hash:</strong>
      <div class="hash">${a.hash_sha256}</div>
    </div>

    <div style="margin-top:10px;">
      <strong>Previous:</strong>
      ${a.previous_anchor ? a.previous_anchor.file : "GENESIS"}
    </div>

    <div style="margin-top:10px;">
      <strong>Signatures:</strong><br>
      ${(a.signatures||[]).map(s=>s.node_id).join("<br>")}
    </div>
  `;
}

function render(graph){
  const canvas=document.getElementById("canvas");
  const svg=document.getElementById("lines");

  canvas.querySelectorAll(".node").forEach(e=>e.remove());
  svg.innerHTML="";
  edgeEls=[];

  placed = layout(graph.nodes,canvas.clientWidth,canvas.clientHeight);
  nodeMap = Object.fromEntries(placed.map(n=>[n.id,n]));

  // edges
  graph.edges.forEach(e=>{
    const s=nodeMap[e.source];
    const t=nodeMap[e.target];
    if(!s||!t)return;

    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",s.x+60);
    l.setAttribute("y1",s.y+20);
    l.setAttribute("x2",t.x+60);
    l.setAttribute("y2",t.y+20);
    l.setAttribute("class","line");
    l.dataset.k=`${e.source}->${e.target}`;
    svg.appendChild(l);
    edgeEls.push(l);
  });

  // nodes
  placed.forEach(n=>{
    const d=document.createElement("div");
    d.className=`node ${n.type}`;
    d.style.left=n.x+"px";
    d.style.top=n.y+"px";
    d.dataset.id=n.id;

    d.innerHTML=`<div>${n.label}</div><div class="type">${n.type}</div>`;

    d.onclick=()=>{
      if(n.type==="anchor"){
        traceChain(n.id);
        renderDetail(n.id);
      }
    };

    canvas.appendChild(d);
  });
}

async function init(){
  await loadAnchorData();
  graphData = await loadGraph();
  render(graphData);
}

window.addEventListener("resize",()=>{
  if(graphData) render(graphData);
});

init();

</script>
