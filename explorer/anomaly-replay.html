<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomaly Replay</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafafa;color:#111;}
header{padding:14px 18px;border-bottom:1px solid #eee;background:#fff;}
main{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 52px);}
#canvas{position:relative;background:#fafafa;overflow:hidden;}
#sidebar{border-left:1px solid #eee;background:#fff;padding:16px;overflow:auto;}
#controls{padding:12px 16px;background:#fff;border-bottom:1px solid #eee;}
button{margin-right:8px;}
.node{
  position:absolute;
  padding:8px 10px;
  border-radius:12px;
  border:2px solid #999;
  background:#fff;
  font-size:12px;
  text-align:center;
  opacity:0.35;
  transition:.2s;
}
.node.active{opacity:1;}
.node.watch{border-color:#ca8a04;background:#fef9c3;}
.node.suspicious{border-color:#ea580c;background:#ffedd5;}
.node.revoked{border-color:#dc2626;background:#fee2e2;}
.node.normal{border-color:#16a34a;background:#edfdf3;}
.item{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
</style>
</head>
<body>
<header><strong>Anomaly Replay</strong></header>
<div id="controls">
  <button onclick="play()">Play</button>
  <button onclick="pause()">Pause</button>
  <button onclick="resetReplay()">Reset</button>
</div>
<main>
  <section id="canvas"></section>
  <aside id="sidebar">
    <h3>Event</h3>
    <div id="eventInfo">No event yet.</div>
  </aside>
</main>

<script>
let replay = null;
let idx = 0;
let timer = null;
let nodes = {};
let positions = {};

async function loadData(){
  replay = await fetch("/explorer/anomaly-replay.json").then(r => r.json());
  initNodes();
}

function collectNodes(){
  const s = new Set();
  (replay.events || []).forEach(e => {
    if(e.node_id) s.add(e.node_id);
  });
  return [...s];
}

function initNodes(){
  const canvas = document.getElementById("canvas");
  canvas.querySelectorAll(".node").forEach(n => n.remove());

  const ids = collectNodes();
  const cx = canvas.clientWidth / 2;
  const cy = canvas.clientHeight / 2;
  const r = Math.min(canvas.clientWidth, canvas.clientHeight) / 3;

  ids.forEach((nid, i) => {
    const a = (2 * Math.PI * i) / Math.max(ids.length, 1);
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    positions[nid] = {x, y};

    const div = document.createElement("div");
    div.className = "node normal";
    div.id = `node-${nid}`;
    div.style.left = `${x}px`;
    div.style.top = `${y}px`;
    div.textContent = nid;
    canvas.appendChild(div);
    nodes[nid] = div;
  });
}

function play(){
  if(timer) return;
  timer = setInterval(step, 900);
}

function pause(){
  clearInterval(timer);
  timer = null;
}

function resetReplay(){
  pause();
  idx = 0;
  Object.values(nodes).forEach(n => {
    n.className = "node normal";
    n.style.opacity = "0.35";
    n.style.transform = "scale(1)";
  });
  document.getElementById("eventInfo").textContent = "Reset.";
}

function step(){
  if(idx >= replay.events.length){
    pause();
    return;
  }
  const evt = replay.events[idx++];
  handleEvent(evt);
}

function handleEvent(evt){
  const el = nodes[evt.node_id];
  if(!el) return;

  el.style.opacity = "1";
  el.style.transform = "scale(1.08)";

  const to = evt.to || "";
  if(to === "watch") el.className = "node watch";
  else if(to === "suspicious") el.className = "node suspicious";
  else if(to === "revoked") el.className = "node revoked";
  else el.className = "node normal";

  setTimeout(() => {
    el.style.transform = "scale(1)";
  }, 600);

  document.getElementById("eventInfo").innerHTML = `
    <div><strong>${evt.node_id}</strong></div>
    <div style="margin-top:8px;">action: ${evt.action || "-"}</div>
    <div>from: ${evt.from || "-"}</div>
    <div>to: ${evt.to || "-"}</div>
    <div>score: ${evt.score ?? "-"}</div>
    <div>anomaly: ${evt.anomaly ?? evt.anomaly_count ?? "-"}</div>
    <div style="margin-top:8px;font-size:12px;color:#666;">${evt.ts || "-"}</div>
  `;
}

window.addEventListener("resize", () => location.reload());

loadData();
</script>
</body>
</html>
