<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance Graph</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafafa;color:#111;}
header{padding:16px 20px;border-bottom:1px solid #eee;background:#fff;}
main{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 58px);}
#canvas{position:relative;overflow:hidden;background:#fafafa;}
#sidebar{border-left:1px solid #eee;background:#fff;padding:18px;overflow:auto;}
.node{
  position:absolute;min-width:120px;padding:10px 12px;border-radius:14px;border:2px solid #999;
  background:#fff;text-align:center;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.node.proposal{border-color:#ca8a04;background:#fef9c3;}
.node.cert{border-color:#16a34a;background:#edfdf3;}
.node.anchor{border-color:#2563eb;background:#eef6ff;}
.node.target{border-color:#dc2626;background:#fee2e2;}
svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.line{stroke:#bdbdbd;stroke-width:1.6;}
.label{font-size:11px;fill:#666;}
.small{font-size:13px;color:#666;line-height:1.6;}
code{background:#f3f3f3;padding:2px 4px;border-radius:4px;}
</style>
</head>
<body>
<header><strong>Governance Graph</strong></header>
<main>
  <section id="canvas">
    <svg id="lines"></svg>
  </section>
  <aside id="sidebar">
    <h3>Detail</h3>
    <div id="detail" class="small">Click a node.</div>
  </aside>
</main>

<script>
let graph = {nodes:[], edges:[]};
let placed = [];
let nodeMap = {};

async function loadData(){
  const idx = await fetch("/governance/anchors/index.json").then(r=>r.json()).catch(()=>({anchors:[]}));

  for(const f of idx.anchors || []){
    const a = await fetch(`/governance/anchors/${f}`).then(r=>r.json());

    const proposalId = a.references?.proposal_id;
    const targetNode = a.references?.target_node;
    const certId = a.certificate_id;
    const anchorId = a.anchor_id;

    graph.nodes.push({id:`proposal:${proposalId}`, label:proposalId, type:"proposal"});
    graph.nodes.push({id:`cert:${certId}`, label:certId, type:"cert"});
    graph.nodes.push({id:`anchor:${anchorId}`, label:anchorId, type:"anchor"});
    graph.nodes.push({id:`target:${targetNode}`, label:targetNode, type:"target"});

    graph.edges.push({source:`proposal:${proposalId}`, target:`cert:${certId}`, label:"issued"});
    graph.edges.push({source:`cert:${certId}`, target:`anchor:${anchorId}`, label:"anchored"});
    graph.edges.push({source:`proposal:${proposalId}`, target:`target:${targetNode}`, label:"targets"});
  }

  render();
}

function layout(nodes, width, height){
  const proposals = nodes.filter(n=>n.type==="proposal");
  const certs = nodes.filter(n=>n.type==="cert");
  const anchors = nodes.filter(n=>n.type==="anchor");
  const targets = nodes.filter(n=>n.type==="target");

  const out = [];
  proposals.forEach((n,i)=> out.push({...n, x:80, y:80+i*120}));
  certs.forEach((n,i)=> out.push({...n, x:width/2-100, y:80+i*120}));
  anchors.forEach((n,i)=> out.push({...n, x:width-260, y:80+i*120}));
  targets.forEach((n,i)=> out.push({...n, x:width/2-100, y:height-120-i*90}));

  return out;
}

function renderDetail(node){
  const el = document.getElementById("detail");
  el.innerHTML = `
    <div><strong>${node.label}</strong></div>
    <div style="margin-top:10px;">
      <div><strong>ID:</strong> <code>${node.id}</code></div>
      <div><strong>Type:</strong> ${node.type}</div>
    </div>
  `;
}

function render(){
  const canvas = document.getElementById("canvas");
  const svg = document.getElementById("lines");

  canvas.querySelectorAll(".node").forEach(el=>el.remove());
  svg.innerHTML = "";

  // 去重
  const uniq = {};
  graph.nodes.forEach(n => uniq[n.id] = n);
  graph.nodes = Object.values(uniq);

  placed = layout(graph.nodes, canvas.clientWidth, canvas.clientHeight);
  nodeMap = Object.fromEntries(placed.map(n=>[n.id,n]));

  graph.edges.forEach(e=>{
    const s = nodeMap[e.source], t = nodeMap[e.target];
    if(!s || !t) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", s.x+60);
    line.setAttribute("y1", s.y+22);
    line.setAttribute("x2", t.x+60);
    line.setAttribute("y2", t.y+22);
    line.setAttribute("class","line");
    svg.appendChild(line);

    const tx = (s.x+t.x)/2+12;
    const ty = (s.y+t.y)/2+10;
    const label = document.createElementNS("http://www.w3.org/2000/svg","text");
    label.setAttribute("x", tx);
    label.setAttribute("y", ty);
    label.setAttribute("class","label");
    label.textContent = e.label;
    svg.appendChild(label);
  });

  placed.forEach(n=>{
    const div = document.createElement("div");
    div.className = `node ${n.type}`;
    div.style.left = `${n.x}px`;
    div.style.top = `${n.y}px`;
    div.innerHTML = `<div>${n.label}</div><div style="font-size:11px;color:#666;">${n.type}</div>`;
    div.onclick = () => renderDetail(n);
    canvas.appendChild(div);
  });
}

window.addEventListener("resize", ()=>location.reload());

loadData();
</script>
</body>
</html>
