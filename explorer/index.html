<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Origins Anchor Explorer</title>

<style>
body{
  margin:0;
  font-family:-apple-system,Segoe UI,sans-serif;
  background:#fafafa;
}

header{
  padding:16px 20px;
  border-bottom:1px solid #eee;
  background:#fff;
}

main{
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 60px);
}

#list{
  border-right:1px solid #eee;
  overflow:auto;
  background:#fff;
}

.item{
  padding:12px 14px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
}

.item:hover{
  background:#f7f7f7;
}

.item.active{
  background:#eef6ff;
}

#detail{
  padding:20px;
  overflow:auto;
}

.badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  font-size:12px;
  background:#eee;
  margin-left:8px;
}

.hash{
  font-family:monospace;
  font-size:12px;
  color:#555;
  word-break:break-all;
}

button{
  margin-top:10px;
  padding:6px 10px;
}
</style>
</head>

<body>

<header>
  <strong>AI Origins — Anchor Explorer</strong>
</header>

<main>
  <div id="list"></div>
  <div id="detail">
    <h3>Anchor Detail</h3>
    <div>Select an anchor</div>
  </div>
</main>

<script>

let anchors = [];
let current = null;

// 加载 index
async function loadIndex(){
  const res = await fetch("/anchors/index.json");
  const data = await res.json();
  anchors = data.anchors.reverse(); // 最新在上
  renderList();
}

// 渲染列表
function renderList(){
  const el = document.getElementById("list");
  el.innerHTML = "";

  anchors.forEach(id=>{
    const d = document.createElement("div");
    d.className="item";
    d.innerText = id;

    d.onclick = ()=>loadAnchor(id,d);

    el.appendChild(d);
  });
}

// 加载 anchor
async function loadAnchor(id, dom){
  document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
  dom.classList.add("active");

  const res = await fetch("/anchors/"+id);
  const a = await res.json();

  current = a;
  renderDetail(a);
}

// 渲染详情
function renderDetail(a){
  const el = document.getElementById("detail");

  el.innerHTML = `
    <h3>${a.certificate_id}</h3>

    <div><strong>Created:</strong> ${a.created_at}</div>

    <div style="margin-top:10px;">
      <strong>Hash:</strong>
      <div class="hash">${a.hash_sha256}</div>
    </div>

    <div style="margin-top:10px;">
      <strong>Previous:</strong>
      ${a.previous_anchor ? a.previous_anchor.file : "GENESIS"}
    </div>

    <button onclick="traceBack()">Trace Back</button>
    <button onclick="verifyHash()">Verify</button>
  `;
}

// 向前追溯
async function traceBack(){
  if(!current.previous_anchor){
    alert("Reached Genesis");
    return;
  }

  const prev = current.previous_anchor.file;
  const dom = [...document.querySelectorAll(".item")]
    .find(x=>x.innerText===prev);

  if(dom) dom.click();
}

// 简单 hash 验证（演示）
async function verifyHash(){
  alert("Hash check logic can run here (client-side verify)");
}

loadIndex();

</script>

</body>
</html>
