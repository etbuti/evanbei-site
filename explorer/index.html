<script>

let anchorMap = {};
let graphData;
let nodeMap = {};
let edgeEls = [];

let activeChains = []; // 当前加载的链
let COLORS = ["#2563eb","#16a34a","#9333ea","#ea580c"];

async function init(){
  const idx = await fetch("/anchors/index.json").then(r=>r.json());

  for(const f of idx.anchors){
    const a = await fetch("/anchors/"+f).then(r=>r.json());
    anchorMap[a.certificate_id] = a;
  }

  graphData = await fetch("/anchors/graph.json").then(r=>r.json());
  renderGraph();
}

function renderGraph(){
  const canvas=document.getElementById("graph");
  const svg=document.getElementById("lines");

  svg.innerHTML="";
  canvas.querySelectorAll(".node").forEach(n=>n.remove());
  edgeEls=[];

  const placed = layout(graphData.nodes,canvas.clientWidth,canvas.clientHeight);
  nodeMap = Object.fromEntries(placed.map(n=>[n.id,n]));

  graphData.edges.forEach(e=>{
    const s=nodeMap[e.source];
    const t=nodeMap[e.target];
    if(!s||!t)return;

    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",s.x+40);
    l.setAttribute("y1",s.y+20);
    l.setAttribute("x2",t.x+40);
    l.setAttribute("y2",t.y+20);
    l.setAttribute("class","line");
    l.dataset.k=`${e.source}->${e.target}`;
    svg.appendChild(l);
    edgeEls.push(l);
  });

  placed.forEach(n=>{
    const d=document.createElement("div");
    d.className="node "+n.type;
    d.style.left=n.x+"px";
    d.style.top=n.y+"px";
    d.dataset.id=n.id;
    d.innerText=n.label;

    canvas.appendChild(d);
  });
}

function layout(nodes,w,h){
  let out=[];
  nodes.forEach((n,i)=>{
    out.push({...n,x:100+(i%3)*200,y:80+Math.floor(i/3)*100});
  });
  return out;
}

// 🔍 搜索
function addChain(){
  const id=document.getElementById("search").value.trim();
  if(!anchorMap[id]) return alert("Not found");

  if(!activeChains.includes(id)){
    activeChains.push(id);
  }

  renderChains();
}

// 多链渲染
function renderChains(){
  clearAll();

  activeChains.forEach((cid,i)=>{
    traceChain(cid,i);
  });
}

// 核心：多链高亮
function traceChain(certId,idx){
  let cur = certId;
  let color = COLORS[idx % COLORS.length];

  while(cur){
    const anchorId="anchor:"+cur;
    activateNode(anchorId,color);

    const a = anchorMap[cur];
    if(!a) break;

    const certNode="cert:"+cur;
    activateNode(certNode,color);
    activateEdge(anchorId,certNode,color);

    (a.signatures||[]).forEach(s=>{
      const nid="node:"+s.node_id;
      activateNode(nid,color);
      activateEdge(certNode,nid,color);
    });

    if(!a.previous_anchor) break;

    const prev=a.previous_anchor.file.replace(".json","");
    activateEdge(anchorId,"anchor:"+prev,color);
    cur = prev;
  }
}

function activateNode(id,color){
  const el=document.querySelector(`[data-id="${id}"]`);
  if(!el) return;

  el.style.opacity=1;
  el.style.borderColor=color;
}

function activateEdge(a,b,color){
  const e=edgeEls.find(x=>x.dataset.k===`${a}->${b}`);
  if(!e) return;

  e.style.stroke=color;
  e.style.strokeWidth=2;
}

function clearAll(){
  document.querySelectorAll(".node").forEach(n=>{
    n.style.opacity=0.2;
    n.style.borderColor="#999";
  });

  edgeEls.forEach(e=>{
    e.style.stroke="#ccc";
    e.style.strokeWidth=1;
  });
}

// 清空
function resetChains(){
  activeChains=[];
  clearAll();
}

init();

</script>
