<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Explorer</title>
<style>
body{margin:0;font-family:-apple-system;background:#fafafa;color:#111;}
header{padding:14px 20px;border-bottom:1px solid #eee;background:#fff;}
main{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 56px);}
#nav{border-right:1px solid #eee;background:#fff;padding:12px;}
.nav-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:6px;}
.nav-item:hover{background:#f3f3f3;}
.nav-item.active{background:#eef6ff;color:#2563eb;}
#frame{width:100%;height:100%;border:0;}
</style>
</head>

<body>

<header><strong>AI Origins Explorer</strong></header>

<main>
  <aside id="nav">
    <div class="nav-item active" onclick="loadPage('policy.html', this)">Policy</div>
    <div class="nav-item" onclick="loadPage('governance.html', this)">Governance</div>
    <div class="nav-item" onclick="loadPage('governance-graph.html', this)">Gov Graph</div>
    <div class="nav-item" onclick="loadPage('cross-graph.html', this)">Cross-Chain</div>
    <div class="nav-item" onclick="loadPage('replay-compare.html', this)">Replay</div>
    <div class="nav-item" onclick="loadPage('heatmap.html', this)">Heatmap</div>
    <div class="nav-item" onclick="loadPage('root-cause.html', this)">Root Cause</div>
    <div class="nav-item" onclick="loadPage('recommendations.html', this)">Recommendations</div>
  </aside>

  <iframe id="frame" src="policy.html"></iframe>
</main>

<script>
function loadPage(page, el){
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("frame").src = page;
}
</script>

</body>
</html>
