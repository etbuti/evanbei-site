name: Spatial Gallery Builder

on:
  push:
    paths:
      - '.github/workflows/spatial.yml'
      - 'spatial/images/inbox/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Workflow started"
          pwd
          ls -la
          mkdir -p spatial/images/inbox
          mkdir -p spatial/images/archive
          mkdir -p spatial/passport/items
          mkdir -p spatial/gallery
          echo "Folders prepared"

      - name: Commit test file
        run: |
          echo "ok $(date -u +%Y-%m-%dT%H:%M:%SZ)" > spatial/gallery/action-test.txt
          git config user.name "spatial-bot"
          git config user.email "spatial-bot@users.noreply.github.com"
          git add spatial/gallery/action-test.txt
          git commit -m "Spatial action test" || echo "no changes"
          git push origin HEAD:main
